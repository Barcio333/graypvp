<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrayPVP - Twoje nowoczesne community</title>
    <style>
        /* Reset podstawowych marginesów */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Tło pełnoekranowe z Twojego obrazka */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); /* Wczytywanie pliku bg.png z folderu */
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* Ciemnoszara nakładka poprawiająca czytelność tekstu */
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(26, 26, 26, 0.4) 0%, rgba(18, 18, 18, 0.85) 100%);
            z-index: -1;
        }

        /* Górny pasek nawigacji - przypięty, nowoczesny szary */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #242424; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            height: 70px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            border-bottom: 2px solid #333333;
        }

        /* Lewa i prawa strona menu */
        .nav-side {
            display: flex;
            gap: 40px;
            width: 40%;
        }

        .nav-side.left {
            justify-content: flex-end;
            margin-right: 30px;
        }

        .nav-side.right {
            justify-content: flex-start;
            margin-left: 30px;
        }

        .nav-item {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease, border-bottom 0.3s ease;
            padding: 23px 0;
            border-bottom: 3px solid transparent;
        }

        .nav-item:hover {
            color: #ffffff;
            border-bottom: 3px solid #707070; 
        }

        /* Logo na środku */
        .nav-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
        }

        /* Stylizacja ikony płomienia */
        .fire-icon {
            width: 32px;
            height: 32px;
            fill: #707070; 
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            transition: transform 0.3s ease, fill 0.3s ease;
        }

        .nav-logo:hover .fire-icon {
            transform: scale(1.1);
            fill: #999999;
        }
