<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrayPVP - Twoje nowoczesne community</title>
    <style>
        /* Reset podstawowych marginesów */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Tło pełnoekranowe stylizowane na Minecraft (z szarym filtrem) */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Podglądowe tło z widokiem Minecrafta (możesz potem podmienić URL na własne zdjęcie) */
            background-image: url('https://images.unsplash.com/photo-1607988795691-3d0147b43231?q=80&w=1920');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* Ciemnoszara nakładka, która nadaje nowoczesny klimat i poprawia czytelność tekstu */
        .hero-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(26, 26, 26, 0.4) 0%, rgba(18, 18, 18, 0.85) 100%);
            z-index: -1;
        }

        /* Górny pasek nawigacji - przypięty, nowoczesny szary */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #242424; /* Nowoczesny ciemnoszary */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            height: 70px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            border-bottom: 2px solid #333333;
        }

        /* Lewa i prawa strona menu */
        .nav-side {
            display: flex;
            gap: 40px;
            width: 40%;
        }

        .nav-side.left {
            justify-content: flex-end;
            margin-right: 30px;
        }

        .nav-side.right {
            justify-content: flex-start;
            margin-left: 30px;
        }

        .nav-item {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s ease, border-bottom 0.3s ease;
            padding: 23px 0;
            border-bottom: 3px solid transparent;
        }

        .nav-item:hover {
            color: #ffffff;
            border-bottom: 3px solid #707070; /* Szary akcent zamiast pomarańczowego */
        }

        /* Logo na środku */
        .nav-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 60px;
            height: 60px;
        }

        /* Stylizacja ikony płomienia */
        .fire-icon {
            width: 32px;
            height: 32px;
            fill: #707070; /* Nowoczesny szary płomień */
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
            transition: transform 0.3s ease, fill 0.3s ease;
        }

        .nav-logo:hover .fire-icon {
            transform: scale(1.1);
            fill: #999999;
        }

        /* Główna zawartość na środku ekranu */
        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 20px;
        }

        .brand-title {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            margin-bottom: 10px;
        }

        /* Szary stylowy człon nazwy */
        .brand-title span {
            color: #8c8c8c;
        }

        .brand-subtitle {
            font-size: 1.5rem;
            color: #cccccc;
            font-weight: 400;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
            margin-bottom: 40px;
        }

        /* Responsywność dla urządzeń mobilnych */
        @media (max-width: 768px) {
            .navbar {
                padding: 0 20px;
            }
            .nav-side {
                gap: 15px;
            }
            .nav-item {
                font-size: 0.75rem;
                letter-spacing: 0.5px;
            }
            .brand-title {
                font-size: 2.8rem;
            }
            .brand-subtitle {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="hero-background"></div>
    <div class="hero-overlay"></div>

    <nav class="navbar">
        <div class="nav-side left">
            <a href="#" class="nav-item">Taryfikator</a>
            <a href="#" class="nav-item">Sklep</a>
        </div>
        
        <div class="nav-logo">
            <svg class="fire-icon" viewBox="0 0 24 24">
                <path d="M12 23c-4.97 0-9-4.03-9-9 0-2.12.74-4.07 1.97-5.61.18-.22.49-.26.71-.08.21.17.26.47.11.7C4.74 10.45 4.5 12.19 4.5 14c0 4.14 3.36 7.5 7.5 7.5s7.5-3.36 7.5-7.5c0-1.81-.24-3.55-1.29-4.99-.15-.23-.1-.53.11-.7.22-.18.53-.14.71.08C20.26 9.93 21 11.88 21 14c0 4.97-4.03 9-9 9zm-1-16.14V11c0 .55.45 1 1 1s1-.45 1-1V6.86c1.69.57 3 2.1 3 3.94 0 2.21-1.79 4-4 4s-4-1.79-4-4c0-1.84 1.31-3.37 3-3.94zM12 1a5 5 0 0 1 5 5c0 1.95-1.12 3.65-2.76 4.47-.31.15-.68-.02-.77-.36-.08-.34.11-.69.44-.81C15.01 8.76 15.5 7.44 15.5 6A3.5 3.5 0 0 0 12 2.5 3.5 3.5 0 0 0 8.5 6c0 1.44.49 2.76 1.59 3.31.33.12.52.47.44.81-.09.34-.46.51-.77.36C8.12 9.65 7 7.95 7 6a5 5 0 0 1 5-5z"/>
            </svg>
        </div>

        <div class="nav-side right">
            <a href="#" class="nav-item">Regulamin</a>
            <a href="https://discord.gg/fr5T3rfN8n" target="_blank" class="nav-item">Discord</a>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="brand-title">Gray<span>PVP</span></h1>
        <p class="brand-subtitle">Twoje nowoczesne community</p>
    </main>

</body>
</html>
